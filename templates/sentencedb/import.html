<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import/Export - One AI Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend Deca', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 min-h-screen">
    {% extends "base.html" %}
    
    {% block content %}
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Import / Export</h1>
        <p class="text-slate-600">Manage your sentence database data.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Import CSV -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold text-slate-800 mb-4">
                <i class="fas fa-file-csv mr-2 text-green-600"></i>Import CSV
            </h2>
            <form method="POST" enctype="multipart/form-data" class="space-y-4">
                <input type="hidden" name="import_type" value="csv">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">CSV File</label>
                    <input type="file" name="csv_file" accept=".csv" required
                           class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition font-medium">
                    <i class="fas fa-upload mr-2"></i>Import CSV
                </button>
            </form>
        </div>

        <!-- Import SQLite -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold text-slate-800 mb-4">
                <i class="fas fa-database mr-2 text-blue-600"></i>Import SQLite
            </h2>
            <form method="POST" enctype="multipart/form-data" class="space-y-4">
                <input type="hidden" name="import_type" value="sqlite">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">SQLite File</label>
                    <input type="file" name="sqlite_file" accept=".db,.sqlite,.sqlite3" required
                           class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition font-medium">
                    <i class="fas fa-upload mr-2"></i>Import SQLite
                </button>
            </form>
        </div>

        <!-- Export All -->
        <div class="bg-white p-6 rounded-lg shadow md:col-span-2">
            <h2 class="text-xl font-semibold text-slate-800 mb-4">
                <i class="fas fa-download mr-2 text-indigo-600"></i>Export Database
            </h2>
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-slate-600 mb-1">Total Sentences: <strong>{{ total }}</strong></p>
                    <p class="text-sm text-slate-500">English: {{ eng }} | Filipino: {{ fil }}</p>
                </div>
                <form method="POST">
                    <input type="hidden" name="import_type" value="export">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition font-medium">
                        <i class="fas fa-file-export mr-2"></i>Export All
                    </button>
                </form>
            </div>
        </div>
    </div>
    {% endblock %}
</body>
</html>
