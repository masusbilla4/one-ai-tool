<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ error_code }} - One AI Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend Deca', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 min-h-screen flex items-center justify-center">
    <div class="text-center px-4">
        <!-- Error Icon -->
        <div class="mb-8">
            <i class="fas fa-exclamation-triangle text-8xl text-red-500"></i>
        </div>
        
        <!-- Error Code -->
        <h1 class="text-6xl font-bold text-slate-800 mb-4">
            {{ error_code }}
        </h1>
        
        <!-- Error Message -->
        <p class="text-xl text-slate-600 mb-8">
            {{ error_message }}
        </p>
        
        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg transition font-medium">
                <i class="fas fa-home mr-2"></i>Go Home
            </a>
            <a href="javascript:history.back()" class="bg-slate-600 hover:bg-slate-700 text-white px-6 py-3 rounded-lg transition font-medium">
                <i class="fas fa-arrow-left mr-2"></i>Go Back
            </a>
        </div>
        
        <!-- Help Text -->
        <div class="mt-12 text-slate-500 text-sm">
            <p>If this problem persists, please contact support.</p>
        </div>
    </div>
</body>
</html>
