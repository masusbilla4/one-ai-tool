{% extends "base.html" %}

{% block title %}Login - One AI Tool{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <div class="text-center mb-8">
            <i class="fas fa-robot text-5xl text-blue-600 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-800">Login to One AI Tool</h1>
            <p class="text-gray-600 mt-2">Access Sentence DB, Extractor, and ASR Aligner</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2" for="username">
                    <i class="fas fa-user mr-2"></i>Username
                </label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your username">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2" for="password">
                    <i class="fas fa-lock mr-2"></i>Password
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter your password">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
