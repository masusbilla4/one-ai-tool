{% extends "base.html" %}

{% block title %}Register - One AI Tool{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-8">
    <div class="content-card p-8 rounded-lg shadow-lg max-w-md w-full">
        <div class="text-center mb-8">
            <i class="fas fa-user-plus text-5xl text-green-400 mb-4"></i>
            <h1 class="text-2xl font-bold text-white">Create Account</h1>
            <p class="text-slate-400 mt-2">Join One AI Tool platform</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-4">
                <label class="block text-slate-300 font-semibold mb-2" for="username">
                    <i class="fas fa-user mr-2"></i>Username
                </label>
                <input type="text" id="username" name="username" required
                    class="input-field w-full px-4 py-2"
                    placeholder="Choose a username">
            </div>

            <div class="mb-4">
                <label class="block text-slate-300 font-semibold mb-2" for="email">
                    <i class="fas fa-envelope mr-2"></i>Email (optional)
                </label>
                <input type="email" id="email" name="email"
                    class="input-field w-full px-4 py-2"
                    placeholder="your@email.com">
            </div>

            <div class="mb-4">
                <label class="block text-slate-300 font-semibold mb-2" for="password">
                    <i class="fas fa-lock mr-2"></i>Password
                </label>
                <input type="password" id="password" name="password" required minlength="4"
                    class="input-field w-full px-4 py-2"
                    placeholder="Min 4 characters">
            </div>

            <div class="mb-6">
                <label class="block text-slate-300 font-semibold mb-2" for="confirm_password">
                    <i class="fas fa-lock mr-2"></i>Confirm Password
                </label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="4"
                    class="input-field w-full px-4 py-2"
                    placeholder="Confirm your password">
            </div>

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-500 text-white py-2 px-4 rounded-lg transition font-medium">
                <i class="fas fa-user-plus mr-2"></i>Create Account
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-slate-400">
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="text-green-400 hover:text-green-300 hover:underline">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
